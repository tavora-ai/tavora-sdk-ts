<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tavora TS SDK — browser chat</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 12px 20px;
        border-bottom: 1px solid #ccc3;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }
      header input {
        padding: 6px 10px;
        font-family: monospace;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #ccc6;
      }
      #baseUrl { width: 220px; }
      #apiKey { width: 300px; }
      header button {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #ccc6;
        background: #2563eb;
        color: white;
        font-weight: 500;
        cursor: pointer;
      }
      header button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        font-size: 12px;
        color: #666;
      }
      main {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .turn {
        max-width: 720px;
        padding: 10px 14px;
        border-radius: 10px;
        white-space: pre-wrap;
        line-height: 1.45;
        font-size: 14px;
      }
      .turn.user {
        align-self: flex-end;
        background: #2563eb;
        color: white;
      }
      .turn.agent {
        align-self: flex-start;
        background: #f1f5f9;
        color: #0f172a;
      }
      .trace {
        align-self: flex-start;
        font-family: monospace;
        font-size: 11px;
        color: #64748b;
        white-space: pre-wrap;
        max-width: 100%;
      }
      footer {
        padding: 12px 20px;
        border-top: 1px solid #ccc3;
        display: flex;
        gap: 8px;
      }
      footer textarea {
        flex: 1;
        resize: none;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc6;
        font-family: inherit;
        font-size: 14px;
      }
      footer button {
        padding: 0 20px;
        border-radius: 6px;
        border: 0;
        background: #2563eb;
        color: white;
        font-weight: 500;
        cursor: pointer;
      }
      footer button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Tavora TS SDK</h1>
      <input id="baseUrl" value="http://localhost:8080" placeholder="API base URL" />
      <input id="apiKey" type="password" placeholder="tvr_..." />
      <button id="connect">Connect</button>
      <span id="status">disconnected</span>
    </header>
    <main id="turns"></main>
    <footer>
      <textarea id="message" rows="2" placeholder="Ask the agent something…" disabled></textarea>
      <button id="send" disabled>Send</button>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
